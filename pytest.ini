[pytest]
testpaths = tests
asyncio_mode = auto
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
markers =
    unit: Unit tests - pure logic, no external deps
    integration: Integration tests - mocked FAISS and embedding deps
    api: API handler tests
addopts = -v --tb=short
